ko:
  manuals:
    show:
      hero:
        headline: "경매 초보의 워크북"
        subhead: "낙찰 전 %{count}개 체크리스트, 낙찰 후 명도 시뮬레이터"
        tagline: "정보를 보여드리는 게 아니라, 직접 분석하는 능력을 길러드립니다."
      flow_strip:
        auction_marker: "낙찰"
      phase_pre:
        heading: "낙찰 전"
        subheading: "%{count}개 체크리스트로 직접 분석합니다"
      phase_post:
        heading: "낙찰 후"
        subheading: "명도 시뮬레이터로 다음 한 수를 정합니다"
    steps:
      budget:
        label: "예산 정하기"
        summary: "경매장에서 감정에 휩쓸려 무리한 가격을 쓰지 않으려면, 시작 전에 절대 넘지 않을 상한선을 정해야 합니다. 낙찰가 외에 취득세·법무비·수리비·이사비까지 들어가니, 부대비용을 미리 빼고 실제 입찰 한도를 계산해 둡니다. 이 한도를 넘기는 순간 잔금 미납으로 입찰보증금(최저가의 10%)을 날릴 위험이 생깁니다."
        actions:
          - "보유 현금과 대출 한도(LTV·DSR 기준)를 입력해 동원 가능한 총 자금을 확인합니다"
          - "취득세·법무비·수리비·이사비를 자동으로 차감해 순수 입찰 가능 금액을 계산합니다"
          - "관심 지역과 평형대를 미리 정해 다음 단계 물건 검색에 그대로 활용합니다"
      properties:
        label: "물건 찾기"
        summary: "전국 법원에는 매주 수천 건의 경매가 올라옵니다. 직접 다 보면 시간만 낭비되니, 1단계에서 정한 예산·지역·평형 조건에 맞는 물건만 추려 '내 목록'에 담아두고 비교합니다. 이 단계에서는 깊이 보는 게 아니라, 분석할 후보를 좁히는 게 목적입니다."
        actions:
          - "법원경매 사이트에서 사건번호 또는 지역으로 검색해 결과를 한 번에 가져옵니다"
          - "관심 가는 물건만 '내 목록'에 추가해 여러 건을 나란히 비교합니다"
          - "예산을 초과하는 물건은 자동으로 표시되어 빠르게 걸러낼 수 있습니다"
      ai_analysis:
        label: "AI 분석"
        summary: "등기부등본과 매각물건명세서는 초보자가 가장 읽기 어려운 문서입니다. 여기서 '말소되지 않는 권리'(낙찰 후에도 인수해야 하는 빚)를 놓치면 낙찰가 외에 수천만 원을 더 물 수 있습니다. AI가 먼저 핵심 위험을 정리해주면 검토 시간을 크게 줄이고, 다음 단계에서 무엇을 집중적으로 검증할지 방향이 잡힙니다."
        actions:
          - "등기부·매각물건명세서·현황조사서를 자동으로 읽어 권리관계를 정리합니다"
          - "말소기준권리와 인수해야 할 금액 등 가장 중요한 숫자를 표로 뽑아냅니다"
          - "선순위 임차인·유치권·법정지상권 같은 위험 신호를 강조해 보여줍니다"
      checklist:
        label: "%{count}개 체크리스트"
        summary: "AI 분석은 출발점이지 정답이 아닙니다. 실제 사고가 났던 경매 사례에서 뽑아낸 %{count}개 항목을 직접 확인해야 누락 위험을 막을 수 있습니다. 권리관계·물건 상태·임차인 점유·시세·명도 난이도를 한 항목씩 채우는 동안 자연스럽게 분석 능력이 길러지는, 워크북의 핵심 단계입니다."
        actions:
          - "권리·물건·임차인·시세·명도 등 %{count}개 항목을 한 줄씩 점검하며 AI 결과를 검증합니다"
          - "각 항목에 등기부·임대차계약서 같은 근거 문서를 첨부하고 현장 메모를 남깁니다"
          - "체크 결과에 따라 안전등급(녹·황·적)이 자동 판정되어 입찰 여부 결정을 도와줍니다"
      eviction_guide:
        label: "명도 가이드"
        summary: "낙찰은 끝이 아니라 시작입니다. 집을 비우게 하는 '명도'는 점유자가 누구냐(전 소유자, 임차인, 유치권자 등)에 따라 절차·기간·비용이 완전히 달라집니다. 입찰 전에 시나리오를 미리 읽어두면 잔금 납부 후 점유자와 협상할 때 헤매지 않고, 협상 카드와 한계선을 미리 정할 수 있습니다."
        actions:
          - "전 소유자·대항력 있는 임차인·대항력 없는 임차인·유치권자 등 점유자 유형별 흐름도를 확인합니다"
          - "각 단계의 예상 소요 기간(평균 2~6개월)과 인도명령·강제집행비를 가이드로 미리 파악합니다"
          - "인도명령신청서·점유이전금지가처분 등 필요한 서류를 체크리스트로 챙깁니다"
      simulator:
        label: "명도 시뮬레이터"
        summary: "가이드를 읽어도 막상 내 물건에 어떤 시나리오가 적용되는지 매핑하기 어렵습니다. 점유자 유형과 상황 질문 몇 개에 답하면 내 케이스의 예상 경로·기간·난이도가 바로 나옵니다. 입찰가를 얼마까지 쓸지, 명도 비용을 얼마로 잡을지 결정할 때 객관적인 근거로 활용할 수 있습니다."
        actions:
          - "내 물건의 점유자 유형을 선택해 시뮬레이션을 시작합니다"
          - "대항력 여부·보증금 인수 여부 같은 분기 질문에 답하면 단계별 경로가 자동으로 제시됩니다"
          - "예상 명도 기간(주 단위)과 난이도(쉬움·보통·어려움)가 산출되어 입찰가 결정에 반영합니다"
    cta:
      budget:
        default: "예산 설정 시작"
        in_progress: "예산 설정 이어서 하기"
      properties:
        default: "물건 추가하기"
      ai_analysis:
        default: "AI 분석할 물건 고르기"
        in_progress: "분석 이어서 하기"
      checklist:
        default: "체크리스트 시작"
        in_progress: "이어서 채우기 (%{done}/%{total})"
      eviction_guide:
        default: "명도 가이드 펴보기"
      simulator:
        default: "시뮬레이터 돌려보기"
        in_progress: "시뮬레이션 이어서 하기"
    status:
      done: "✓ 완료"
      in_progress: "▶ 진행 중"
      pending: "· 미시작"
