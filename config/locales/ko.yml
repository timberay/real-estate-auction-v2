# Korean translations for ActiveRecord/ActiveModel validation messages.
#
# Korean grammar requires distinct postpositional particles depending on whether
# the preceding word ends in a consonant ("받침"). Rails locale strings can't
# carry that logic, so we use the conventional dual-particle form like
# "을(를)" / "은(는)" / "이(가)" — readable and unambiguous.
#
# The `errors.format` is set to "%{attribute} %{message}" (no separator) so the
# message can begin with the appropriate particle and read naturally:
#   "쓸 수 있는 현금 은(는) 0보다 커야 합니다"
ko:
  errors:
    format: "%{attribute} %{message}"
    messages:
      blank: "을(를) 입력해 주세요"
      present: "을(를) 비워 두세요"
      taken: "은(는) 이미 사용 중입니다"
      invalid: "이(가) 올바르지 않습니다"
      not_a_number: "은(는) 숫자여야 합니다"
      not_an_integer: "은(는) 정수여야 합니다"
      greater_than: "은(는) %{count}보다 커야 합니다"
      greater_than_or_equal_to: "은(는) %{count} 이상이어야 합니다"
      less_than: "은(는) %{count}보다 작아야 합니다"
      less_than_or_equal_to: "은(는) %{count} 이하여야 합니다"
      equal_to: "은(는) %{count}이어야 합니다"
      other_than: "은(는) %{count}이(가) 아니어야 합니다"
      odd: "은(는) 홀수여야 합니다"
      even: "은(는) 짝수여야 합니다"
      inclusion: "은(는) 허용된 값이 아닙니다"
      exclusion: "은(는) 사용할 수 없는 값입니다"
      too_long: "은(는) 너무 깁니다 (최대 %{count}자)"
      too_short: "은(는) 너무 짧습니다 (최소 %{count}자)"
      wrong_length: "은(는) 길이가 올바르지 않습니다 (정확히 %{count}자)"
      confirmation: "이(가) 일치하지 않습니다"
      accepted: "을(를) 동의해 주세요"
      empty: "을(를) 입력해 주세요"
      required: "이(가) 필요합니다"
      model_invalid: "검증 실패: %{errors}"

  activerecord:
    errors:
      messages:
        record_invalid: "검증 실패: %{errors}"
        restrict_dependent_destroy:
          has_one: "%{record}이(가) 존재하므로 삭제할 수 없습니다"
          has_many: "%{record}이(가) 존재하므로 삭제할 수 없습니다"
    attributes:
      budget_setting:
        available_cash: "쓸 수 있는 현금"
        loan_ratio: "대출 비율"
        loan_policy_id: "대출 정책"
        property_type_id: "부동산 유형"
        region: "관심 지역"
        repair_cost: "수선비"
