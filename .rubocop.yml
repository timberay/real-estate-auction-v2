# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

inherit_mode:
  merge:
    - Exclude

# db/schema.rb is autogenerated; Rails 8's dumper format conflicts with
# rubocop-rails-omakase. Skip layout checks on it.
Layout:
  Exclude:
    - db/schema.rb

# Overwrite or add rules to create your own house style
#
# # Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
# Layout/SpaceInsideArrayLiteralBrackets:
#   Enabled: false
